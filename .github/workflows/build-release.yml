name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build whisper.cpp static binaries ──────────────────────────────
  build-whisper:
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU-only builds
          - os: ubuntu-latest
            platform: linux-x64
            variant: cpu
            asset_name: whisper-cli-linux-x64
            cmake_flags: ""
            pre_install: ""
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            variant: cpu
            asset_name: whisper-cli-linux-arm64
            cmake_flags: ""
            pre_install: ""
          # CUDA 12 (NVIDIA GPU)
          - os: ubuntu-latest
            platform: linux-x64
            variant: cuda12
            asset_name: whisper-cli-linux-x64-cuda12
            cmake_flags: "-DGGML_CUDA=ON"
            pre_install: "cuda"
          # Vulkan (Intel/AMD/NVIDIA GPU)
          - os: ubuntu-latest
            platform: linux-x64
            variant: vulkan
            asset_name: whisper-cli-linux-x64-vulkan
            cmake_flags: "-DGGML_VULKAN=ON"
            pre_install: "vulkan"
          # ROCm (AMD GPU)
          - os: ubuntu-latest
            platform: linux-x64
            variant: rocm
            asset_name: whisper-cli-linux-x64-rocm
            cmake_flags: "-DGGML_HIP=ON -DCMAKE_C_COMPILER=/opt/rocm/bin/hipcc -DCMAKE_CXX_COMPILER=/opt/rocm/bin/hipcc"
            pre_install: "rocm"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Install CUDA Toolkit
        if: matrix.pre_install == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install cuBLAS
        if: matrix.pre_install == 'cuda'
        run: sudo apt-get install -y libcublas-dev-12-6

      - name: Install Vulkan SDK
        if: matrix.pre_install == 'vulkan'
        run: |
          sudo apt-get install -y glslc libvulkan-dev

      - name: Install ROCm
        if: matrix.pre_install == 'rocm'
        run: |
          wget -q https://repo.radeon.com/rocm/rocm.gpg.key -O - | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.3 noble main" | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y hipcc hip-dev rocblas-dev hipblas-dev
          echo "/opt/rocm/bin" >> $GITHUB_PATH

      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper

      - name: Build whisper-cli
        run: |
          cd /tmp/whisper
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            ${{ matrix.cmake_flags }}
          cmake --build build --config Release -j$(nproc)

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: /tmp/whisper/build/bin/whisper-cli

  # ── Build plugin + create release ──────────────────────────────────
  build:
    needs: build-whisper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test WhisperSubs.Tests/WhisperSubs.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' WhisperSubs.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          mkdir -p release
          cp bin/Release/net9.0/WhisperSubs.dll release/
          cp bin/Release/net9.0/WhisperSubs.pdb release/ 2>/dev/null || true
          cd release && zip -r ../WhisperSubs_${{ steps.version.outputs.version }}.zip .

      - name: Calculate checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum WhisperSubs_${{ steps.version.outputs.version }}.zip | cut -d ' ' -f 1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Download whisper binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: whisper-binaries

      - name: Prepare whisper binaries for release
        run: |
          for dir in whisper-binaries/whisper-cli-*; do
            platform=$(basename "$dir")
            cp "$dir/whisper-cli" "./${platform}"
            chmod +x "./${platform}"
          done
          ls -la whisper-cli-*

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > manifest.json << EOF
          [
            {
              "guid": "97124bd9-c8cd-4a53-a213-e593aa3fef52",
              "name": "WhisperSubs",
              "description": "Automated subtitle generation for Jellyfin using local AI models (Whisper, Parakeet, etc.)",
              "overview": "Generate subtitles for your media library using local speech-to-text AI models. Supports Whisper, Parakeet, and custom command providers. All processing happens locally on your server.",
              "owner": "GeiserX",
              "category": "Subtitles",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/GeiserX/whisper-subs/releases",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "https://github.com/GeiserX/whisper-subs/releases/download/v${VERSION}/WhisperSubs_${VERSION}.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: WhisperSubs v${{ steps.version.outputs.version }}
          files: |
            WhisperSubs_${{ steps.version.outputs.version }}.zip
            whisper-cli-linux-x64
            whisper-cli-linux-arm64
            whisper-cli-linux-x64-cuda12
            whisper-cli-linux-x64-vulkan
            whisper-cli-linux-x64-rocm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
