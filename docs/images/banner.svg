<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4C9A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#6B4C9A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Speech bubble with subtitle lines icon -->
  <g transform="translate(80, 100)">
    <!-- Speech bubble -->
    <path d="M-42,-38 L42,-38 C48,-38 52,-34 52,-28 L52,16 C52,22 48,26 42,26 L6,26 L-4,42 L-8,26 L-42,26 C-48,26 -52,22 -52,16 L-52,-28 C-52,-34 -48,-38 -42,-38 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- Subtitle text lines inside bubble -->
    <rect x="-32" y="-22" width="40" height="4" rx="2" fill="#A78BFA" opacity="0.7"/>
    <rect x="-32" y="-12" width="52" height="4" rx="2" fill="#A78BFA" opacity="0.5"/>
    <rect x="-32" y="-2" width="36" height="4" rx="2" fill="#A78BFA" opacity="0.7"/>
    <rect x="-32" y="8" width="48" height="4" rx="2" fill="#A78BFA" opacity="0.5"/>
    <!-- Sound wave arcs -->
    <path d="M58,-14 C64,-8 64,8 58,14" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M66,-22 C76,-12 76,12 66,22" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <path d="M74,-30 C88,-16 88,16 74,30" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    JellySubtitles
  </text>

  <!-- Tagline -->
  <text x="202" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#C4B5FD" letter-spacing="0.5">
    Local AI subtitle generation for Jellyfin
  </text>

  <!-- Bottom accent line -->
  <rect x="200" y="142" width="80" height="2.5" rx="1.25" fill="#A78BFA" opacity="0.6"/>
</svg>
